<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Planner App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 自訂簡單的捲軸樣式 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 font-sans p-4 md:p-8">

    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row min-h-[80vh]">
        
        <div class="w-full md:w-1/2 p-6 md:p-8 border-b md:border-b-0 md:border-r border-slate-200 bg-slate-50 flex flex-col">
            <header class="mb-6">
                <h1 class="text-3xl font-bold text-indigo-600 mb-1">今日手帳</h1>
                <p id="current-date" class="text-slate-500 font-medium"></p>
            </header>

            <div class="flex-grow flex flex-col">
                <label for="journal-note" class="text-sm font-semibold text-slate-600 mb-2">靈感與紀錄</label>
                <textarea id="journal-note" placeholder="今天有什麼特別的想法或紀錄呢？" 
                    class="w-full flex-grow p-4 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent resize-none shadow-sm text-slate-700"></textarea>
            </div>
            <button onclick="saveNote()" class="mt-4 w-full bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-3 rounded-xl transition duration-200 shadow-md">
                儲存筆記
            </button>
        </div>

        <div class="w-full md:w-1/2 p-6 md:p-8 flex flex-col">
            <h2 class="text-2xl font-bold text-slate-700 mb-6"><i class="fas fa-check-square text-indigo-500 mr-2"></i>任務清單</h2>
            
            <div class="flex gap-2 mb-6">
                <input type="text" id="task-input" placeholder="新增待辦事項..." 
                    class="flex-grow p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-400 transition">
                <button onclick="addTask()" class="bg-indigo-500 hover:bg-indigo-600 text-white px-5 rounded-xl font-semibold transition shadow-sm">
                    <i class="fas fa-plus"></i>
                </button>
            </div>

            <ul id="task-list" class="flex-grow overflow-y-auto space-y-3 pr-2">
                </ul>
        </div>
    </div>

    <script>
        // 設定今日日期
        const dateElement = document.getElementById('current-date');
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        dateElement.textContent = new Date().toLocaleDateString('zh-TW', options);

        // 初始化狀態
        let tasks = JSON.parse(localStorage.getItem('planner_tasks')) || [];
        let note = localStorage.getItem('planner_note') || '';

        const taskInput = document.getElementById('task-input');
        const taskList = document.getElementById('task-list');
        const noteArea = document.getElementById('journal-note');

        // 載入筆記
        noteArea.value = note;

        // 儲存筆記
        function saveNote() {
            localStorage.setItem('planner_note', noteArea.value);
            // 簡單的視覺回饋
            const btn = document.querySelector('button[onclick="saveNote()"]');
            const originalText = btn.textContent;
            btn.textContent = '已儲存 ✓';
            btn.classList.add('bg-green-500');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('bg-green-500');
            }, 1500);
        }

        // 渲染任務列表
        function renderTasks() {
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = `flex items-center justify-between p-4 rounded-xl border ${task.completed ? 'bg-slate-50 border-slate-100' : 'bg-white border-slate-200 shadow-sm'} transition-all duration-200`;
                
                li.innerHTML = `
                    <div class="flex items-center gap-3 cursor-pointer" onclick="toggleTask(${index})">
                        <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center ${task.completed ? 'bg-indigo-500 border-indigo-500 text-white' : 'border-slate-300 text-transparent'} transition">
                            <i class="fas fa-check text-xs"></i>
                        </div>
                        <span class="${task.completed ? 'line-through text-slate-400' : 'text-slate-700 font-medium'}">${task.text}</span>
                    </div>
                    <button onclick="deleteTask(${index})" class="text-slate-300 hover:text-red-500 transition p-2">
                        <i class="fas fa-trash"></i>
                    </button>
                `;
                taskList.appendChild(li);
            });
            saveTasks();
        }

        // 新增任務
        function addTask() {
            const text = taskInput.value.trim();
            if (text) {
                tasks.push({ text: text, completed: false });
                taskInput.value = '';
                renderTasks();
            }
        }

        // 支援 Enter 鍵新增
        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });

        // 切換任務狀態
        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            renderTasks();
        }

        // 刪除任務
        function deleteTask(index) {
            tasks.splice(index, 1);
            renderTasks();
        }

        // 儲存任務到 LocalStorage
        function saveTasks() {
            localStorage.setItem('planner_tasks', JSON.stringify(tasks));
        }

        // 初始渲染
        renderTasks();
    </script>
</body>
</html>
